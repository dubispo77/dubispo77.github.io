<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor Completo — Posição & Tamanho</title>
<link rel="icon" type="image/x-icon" href="assets/favicon/favicon.ico?v=2">
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon/favicon-32.png?v=2">
<link rel="icon" type="image/png" sizes="16x16" href="assets/favicon/favicon-16.png?v=2">
<link rel="apple-touch-icon" sizes="180x180" href="assets/favicon/apple-touch-icon.png?v=2">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0f0f0f;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            padding: 20px;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 { font-size: 28px; margin-bottom: 10px; }
        .subtitle { color: #4ade80; font-size: 12px; margin-bottom: 20px; }

        .buttons { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
        button {
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            background: #374151;
            color: #d1d5db;
        }
        button:hover { background: #4b5563; }
        button.active { background: #2563eb; color: white; transform: scale(1.05); }

        .card-name { text-align: center; color: #999; font-size: 12px; margin-bottom: 10px; }

        .preview {
            width: 100%;
            max-width: 480px;
            aspect-ratio: 4/3;
            margin: 0 auto 20px;
            background: #1f2937;
            border: 2px solid #374151;
            border-radius: 8px;
            background-repeat: no-repeat;
            background-position: 50% 50%;
            cursor: grab;
            user-select: none;
        }
        .preview:active { cursor: grabbing; }

        .controls { margin-bottom: 20px; }
        .control-group { margin-bottom: 15px; }
        .label { font-size: 12px; color: #d1d5db; display: flex; justify-content: space-between; margin-bottom: 8px; }
        .value { color: #60a5fa; font-weight: bold; font-size: 14px; }

        input[type="range"] {
            width: 100%;
            height: 12px;
            border-radius: 6px;
            background: #374151;
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #2563eb;
            cursor: pointer;
        }
        input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #2563eb;
            cursor: pointer;
            border: none;
        }

        .row-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }

        .button-row { display: flex; gap: 10px; }
        .button-row button { flex: 1; }
        .reset-btn { background: #4b5563; }
        .copy-btn { background: #2563eb; }
        .copy-btn.copied { background: #16a34a; }

        .css-output {
            background: #1a1a1a;
            border-left: 4px solid #2563eb;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 10px;
            max-height: 180px;
            overflow-y: auto;
        }
        .css-output p { font-size: 10px; color: #666; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px; }
        .css-output pre { font-family: 'Monaco', 'Courier New', monospace; font-size: 11px; color: #4ade80; white-space: pre-wrap; word-break: break-all; }

        .hint { font-size: 11px; color: #666; text-align: center; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 Editor Completo — Posição & Tamanho</h1>
        <p class="subtitle">Ajuste tudo em um só lugar</p>

        <div class="buttons" id="buttons"></div>

        <p class="card-name" id="cardName">Cortez</p>

        <div class="preview" id="preview"></div>

        <div class="controls">
            <div class="row-controls">
                <!-- TAMANHO -->
                <div class="control-group">
                    <div class="label">
                        <span>Tamanho (Escala)</span>
                        <span class="value"><span id="sizeValue">100</span>%</span>
                    </div>
                    <input type="range" id="sizeSlider" min="50" max="400" value="100">
                </div>

                <!-- POSIÇÃO X -->
                <div class="control-group">
                    <div class="label">
                        <span>Posição Horizontal</span>
                        <span class="value"><span id="posXValue">50</span>%</span>
                    </div>
                    <input type="range" id="posXSlider" min="0" max="100" value="50">
                </div>
            </div>

            <!-- POSIÇÃO Y -->
            <div class="control-group">
                <div class="label">
                    <span>Posição Vertical</span>
                    <span class="value"><span id="posYValue">50</span>%</span>
                </div>
                <input type="range" id="posYSlider" min="0" max="100" value="50">
            </div>

            <div class="button-row" style="margin-bottom: 15px;">
                <button class="reset-btn" onclick="resetAll()">↺ Resetar Tudo</button>
                <button class="copy-btn" id="copyBtn" onclick="copyCSSToClipboard()">📋 Copiar CSS</button>
            </div>
        </div>

        <div class="css-output">
            <p>CSS Gerado</p>
            <pre id="cssOutput"></pre>
        </div>

        <p class="hint">💡 Arraste a imagem ou use os sliders • Copy & paste no seu index.html</p>
    </div>

    <script>
        const cardNames = [
            'Cortez', 'Stock Car', 'Claro tv+', 'AirBrush', 'Fórmula 4',
            'Tecmundo', 'Turismo Nac.', 'Fórmula Grün', 'Decoupling', 'Menze',
            'Universal', 'MAVTV', 'Brasileirão Play'
        ];

        const imageFiles = [
            'cortez.jpg', 'stockcar.jpg', 'claro.jpg', 'Airbrush_02.png', 'F4_01.png',
            'tecmundo.jpg', 'turismo.jpg', 'formula_grun.jpg', 'decoupling.jpg', 'menze.jpg',
            'universal.jpg', 'mavtv.jpg', 'brasileirao.jpg'
        ];

        const state = {
            0: { size: 227, x: 60, y: 36 },
            1: { size: 100, x: 50, y: 50 },
            2: { size: 100, x: 50, y: 50 },
            3: { size: 105, x: 50, y: 50 },
            4: { size: 100, x: 50, y: 50 },
            5: { size: 100, x: 50, y: 50 },
            6: { size: 100, x: 50, y: 50 },
            7: { size: 100, x: 50, y: 50 },
            8: { size: 100, x: 50, y: 50 },
            9: { size: 100, x: 50, y: 50 },
            10: { size: 100, x: 50, y: 50 },
            11: { size: 100, x: 50, y: 50 },
            12: { size: 305, x: 67, y: 100 }
        };

        let selectedCard = 0;
        let isDragging = false;
        let dragStart = { x: 0, y: 0 };
        const timestamp = Date.now();

        // Inicializar botões
        const buttonsContainer = document.getElementById('buttons');
        cardNames.forEach((name, idx) => {
            const btn = document.createElement('button');
            btn.textContent = name;
            btn.className = idx === 0 ? 'active' : '';
            btn.onclick = () => selectCard(idx);
            buttonsContainer.appendChild(btn);
        });

        function selectCard(idx) {
            selectedCard = idx;
            document.querySelectorAll('.buttons button').forEach((btn, i) => {
                btn.classList.toggle('active', i === idx);
            });
            document.getElementById('sizeSlider').value = state[idx].size;
            document.getElementById('posXSlider').value = state[idx].x;
            document.getElementById('posYSlider').value = state[idx].y;
            document.getElementById('cardName').textContent = cardNames[idx];
            updateDisplay();
        }

        function updateDisplay() {
            const s = state[selectedCard];
            document.getElementById('sizeValue').textContent = s.size;
            document.getElementById('posXValue').textContent = s.x;
            document.getElementById('posYValue').textContent = s.y;
            updatePreview();
            updateCSS();
        }

        function updatePreview() {
            const s = state[selectedCard];
            const imageUrl = `https://dubispo77.github.io/Thumbs/${imageFiles[selectedCard]}?v=${timestamp}`;
            const preview = document.getElementById('preview');
            preview.style.backgroundImage = `url("${imageUrl}")`;
            preview.style.backgroundSize = `${s.size}%`;
            preview.style.backgroundPosition = `${s.x}% ${s.y}%`;
        }

        function updateCSS() {
            const s = state[selectedCard];
            const childIndex = selectedCard + 1;
            const css = `.work-card:nth-child(${childIndex}) .work-card-bg {
  background-image: url('Thumbs/${imageFiles[selectedCard]}');
  background-size: ${s.size}%;
  background-position: ${s.x}% ${s.y}%;
}`;
            document.getElementById('cssOutput').textContent = css;
        }

        function resetAll() {
            state[selectedCard] = { size: 100, x: 50, y: 50 };
            selectCard(selectedCard);
        }

        function copyCSSToClipboard() {
            const css = document.getElementById('cssOutput').textContent;
            navigator.clipboard.writeText(css).then(() => {
                const btn = document.getElementById('copyBtn');
                btn.textContent = '✓ Copiado!';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = '📋 Copiar CSS';
                    btn.classList.remove('copied');
                }, 2000);
            });
        }

        // Drag para mover a imagem
        const preview = document.getElementById('preview');
        preview.addEventListener('mousedown', (e) => {
            isDragging = true;
            dragStart = { x: e.clientX, y: e.clientY };
        });

        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const deltaX = e.clientX - dragStart.x;
            const deltaY = e.clientY - dragStart.y;
            const s = state[selectedCard];
            s.x = Math.max(0, Math.min(100, s.x + deltaX / 3));
            s.y = Math.max(0, Math.min(100, s.y + deltaY / 3));
            dragStart = { x: e.clientX, y: e.clientY };
            updateDisplay();
        });

        document.addEventListener('mouseup', () => {
            isDragging = false;
        });

        // Sliders
        document.getElementById('sizeSlider').addEventListener('input', (e) => {
            state[selectedCard].size = parseInt(e.target.value);
            updateDisplay();
        });

        document.getElementById('posXSlider').addEventListener('input', (e) => {
            state[selectedCard].x = parseInt(e.target.value);
            updateDisplay();
        });

        document.getElementById('posYSlider').addEventListener('input', (e) => {
            state[selectedCard].y = parseInt(e.target.value);
            updateDisplay();
        });

        // Inicializar
        selectCard(0);
    </script>
</body>
</html>
